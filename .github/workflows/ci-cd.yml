# ===========================
# .github/workflows/ci-cd.yml
# GitHub Actions - CI/CD Pipeline
# Runs automatically on every git push!
# ===========================

name: Portfolio CI/CD Pipeline

# WHEN does this run?
on:
  push:
    branches: [ main ]       # On push to main branch
  pull_request:
    branches: [ main ]       # On pull requests to main

jobs:

  # ===== JOB 1: Test & Lint Frontend =====
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check HTML files exist
        run: |
          echo "✅ Checking frontend files..."
          ls -la index.html style.css script.js
          echo "✅ All frontend files present!"

      - name: Validate HTML structure
        run: |
          echo "Checking for required HTML sections..."
          grep -q 'id="hero"' index.html && echo "✅ Hero section found"
          grep -q 'id="about"' index.html && echo "✅ About section found"
          grep -q 'id="skills"' index.html && echo "✅ Skills section found"
          grep -q 'id="projects"' index.html && echo "✅ Projects section found"
          grep -q 'id="contact"' index.html && echo "✅ Contact section found"
          echo "✅ All sections verified!"

  # ===== JOB 2: Test Backend =====
  backend-test:
    name: Backend Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Run tests
        working-directory: ./backend
        run: npm test

      - name: Run lint
        working-directory: ./backend
        run: npm run lint

      - name: Check server.js syntax
        working-directory: ./backend
        run: node --check server.js && echo "✅ server.js syntax is valid!"

  # ===== JOB 3: Deploy to GitHub Pages (only on push to main) =====
  deploy-frontend:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-test]  # Only runs if both jobs above pass!
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./        # Deploy from root folder
          publish_branch: gh-pages
          exclude_assets: '.github,backend,node_modules,.gitignore,README.md'

      - name: Deployment success
        run: echo "🚀 Frontend deployed to GitHub Pages!"
